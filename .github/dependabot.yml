# Configure Dependabot scanning.
version: 2

updates:
  # Check for updates to GitHub Actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    cooldown:
      default-days: 7
    groups:
      github-actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch
